name: 每日股票分析 (DeepSeek修复版)

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # ==========================================
          # 核心修复：LiteLLM 配置 (强制指定 DeepSeek)
          # ==========================================
          # 告诉 LiteLLM 使用 openai 协议调用 deepseek-chat
          LITELLM_MODEL: 'openai/deepseek-chat'
          
          # 具体的 API 配置
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: 'https://api.deepseek.com'
          OPENAI_MODEL: 'deepseek-chat'
          
          # ==========================================
          # 其他配置 (保持不变)
          # ==========================================
          # 数据源
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          
          # 搜索服务
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # 通知渠道
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          
          # 运行参数
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          REPORT_TYPE: 'simple'
          MARKET_REVIEW_ENABLED: 'true'
          
        run: |
          # 调试信息：打印关键变量状态（不打印 Key）
          echo "================ 配置检查 ================"
          echo "LITELLM_MODEL: $LITELLM_MODEL"
          echo "OPENAI_BASE_URL: $OPENAI_BASE_URL"
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY: ✅ 已检测到 (长度: ${#OPENAI_API_KEY})"
          else
            echo "OPENAI_API_KEY: ❌ 未设置 (请在 Secrets 中添加 DEEPSEEK_API_KEY)"
          fi
          echo "========================================"

          # 构建参数
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          # 运行
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports
          path: |
            reports/
            logs/
