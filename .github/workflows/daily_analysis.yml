name: 每日股票分析 (DeepSeek适配版)

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # ==========================================
          # 核心修复：强制指定使用 DeepSeek
          # ==========================================
          # 1. 告诉程序使用 OpenAI 协议调用 deepseek-chat
          LITELLM_MODEL: 'openai/deepseek-chat'
          
          # 2. 将你的 Secrets 映射到程序能识别的环境变量
          # 左边是程序要的变量名 = 右边是你截图里设置的 Secret 名
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          
          # ==========================================
          # 其他配置
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          
          # 通知配置 (适配你的截图)
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          
          # 运行参数
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          # 强制开启大盘分析，避免因为找不到股票列表而空跑
          MARKET_REVIEW_ENABLED: 'true'
          REPORT_TYPE: 'simple'
          
        run: |
          # 调试打印：确认变量是否注入成功 (出于安全不打印 Key 的具体值)
          echo "================ 调试信息 ================"
          echo "正在连接 AI 模型..."
          echo "LITELLM_MODEL: $LITELLM_MODEL"
          echo "API Base: $OPENAI_BASE_URL"
          echo "Model: $OPENAI_MODEL"
          
          if [ -z "$OPENAI_API_KEY" ]; then
             echo "❌ 错误：未检测到 OPENAI_API_KEY，请检查 Secrets 配置！"
          else
             echo "✅ 检测到 OPENAI_API_KEY (长度: ${#OPENAI_API_KEY})"
          fi
          echo "========================================"

          # 构建参数
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          # 运行程序
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports
          path: |
            reports/
            logs/
